version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # SIMULATOR — fake GPU metrics for development
  # ---------------------------------------------------------------------------

  simulator:
    build:
      context: .
      dockerfile: Dockerfile
      target: simulator
    ports:
      - "9100:9100"

  # ---------------------------------------------------------------------------
  # TELEMETRY PLANE — observability pipeline
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - simulator

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: veltrix
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/gpu-cluster-overview.json
      GF_INSTALL_PLUGINS: grafana-clock-panel
      SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/REPLACE_ME"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # DATA PLANE — infrastructure services (not needed for dashboard demo)
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: veltrix
      POSTGRES_DB: veltrix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - full

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - full

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
