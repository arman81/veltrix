version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # DATA PLANE — infrastructure services
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: veltrix
      POSTGRES_DB: veltrix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # TELEMETRY PLANE — observability pipeline
  # ---------------------------------------------------------------------------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8889:8889"   # Prometheus metrics exporter
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: veltrix
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # CONTROL PLANE — Veltrix services
  # ---------------------------------------------------------------------------

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "8080:8080"
    environment:
      VELTRIX_PORT: "8080"
      VELTRIX_POSTGRES_HOST: postgres
      VELTRIX_POSTGRES_PORT: "5432"
      VELTRIX_POSTGRES_DB: veltrix
      VELTRIX_POSTGRES_USER: postgres
      VELTRIX_POSTGRES_PASS: veltrix
      VELTRIX_REDIS_ADDR: "redis:6379"
      VELTRIX_OTEL_ENDPOINT: "otel-collector:4317"
      VELTRIX_AUTH_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started

  # ---------------------------------------------------------------------------
  # EXECUTION PLANE — Node agent
  # ---------------------------------------------------------------------------

  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    environment:
      VELTRIX_API_ENDPOINT: "http://api:8080"
      VELTRIX_OTEL_ENDPOINT: "otel-collector:4317"
      VELTRIX_NODE_ID: "dev-node-1"
    depends_on:
      - api

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
