version: "3.9"

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_DB: gpu
    ports:
      - "5432:5432"

  kafka:
    image: bitnami/kafka:latest
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
    depends_on:
      - zookeeper

  zookeeper:
    image: bitnami/zookeeper:latest
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  api:
    build: ./api
    ports:
      - "50051:50051"
    depends_on:
      - postgres
      - kafka

  worker:
    build: ./worker
    depends_on:
      - kafka

  agent:
    build: ./agent
    depends_on:
      - api

  ui:
    build: ./ui
    ports:
      - "3000:3000"